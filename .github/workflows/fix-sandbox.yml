name: Sandbox Preflight Validator

on:
  workflow_run:
    workflows:
      - Sandbox Validation Request Collector
    types:
      - completed

concurrency:
  group: sandbox-preflight-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Run sandbox preflight gate
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.name == 'Sandbox Validation Request Collector' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.repository.full_name == github.repository &&
      github.repository == 'Vectology-cloud-team/namma-rogue-agent'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: read
      pull-requests: read
    outputs:
      preflight_ready: ${{ steps.preflight.outputs.preflight_ready || 'false' }}
      should_comment: ${{ steps.preflight.outputs.should_comment || 'false' }}
      artifact_name: ${{ steps.preflight.outputs.artifact_name }}
      pr_number: ${{ steps.validate_request.outputs.pr_number }}
      head_sha: ${{ steps.validate_request.outputs.head_sha }}
      status: ${{ steps.preflight.outputs.status }}
      validation_id: ${{ steps.preflight.outputs.validation_id }}
    steps:
      - name: Download trusted sandbox control plane
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TRUSTED_REF: ${{ github.sha }}
          CONTROL_DIR: ${{ github.workspace }}/sandbox-control
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          ref = os.environ["TRUSTED_REF"]
          control_dir = Path(os.environ["CONTROL_DIR"])
          paths = [
              "scripts/sandbox_validation.py",
              "scripts/fix_proposal_generator.py",
              "scripts/approval_record.py",
              "scripts/architect_review_retry.py",
              "scripts/check_fix_proposal_design.py",
              ".github/codex/fix-policy.yml",
              ".github/codex/schemas/fix-proposal.schema.json",
              ".github/codex/schemas/approval-record.schema.json",
              ".github/codex/schemas/sandbox-validation-result.schema.json",
          ]
          for path in paths:
              quoted = urllib.parse.quote(path, safe="/")
              url = f"https://api.github.com/repos/{repo}/contents/{quoted}?ref={ref}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))
              if payload.get("type") != "file" or payload.get("encoding") != "base64":
                  raise RuntimeError(f"trusted control file unavailable: {path}")
              data = base64.b64decode(payload["content"])
              destination = control_dir / path
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(data)
          PY

      - name: Download sandbox request artifact
        id: download_request
        env:
          PYTHONPATH: ${{ github.workspace }}/sandbox-control/scripts
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COLLECTOR_RUN_ID: ${{ github.event.workflow_run.id }}
          ARTIFACT_NAME: sandbox-validation-request-${{ github.event.workflow_run.id }}
          SANDBOX_REQUEST_DIR: ${{ github.workspace }}/sandbox-validation-request
          MAX_ARTIFACT_BYTES: "50000"
        run: |
          python3 sandbox-control/scripts/sandbox_validation.py download-request-artifact

      - name: Validate sandbox request manifest
        id: validate_request
        env:
          PYTHONPATH: ${{ github.workspace }}/sandbox-control/scripts
          SANDBOX_REQUEST_DIR: ${{ github.workspace }}/sandbox-validation-request
        run: |
          python3 sandbox-control/scripts/sandbox_validation.py validate-request

      - name: Run preflight gate without sandbox changes
        id: preflight
        env:
          PYTHONPATH: ${{ github.workspace }}/sandbox-control/scripts
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SANDBOX_REQUEST_DIR: ${{ github.workspace }}/sandbox-validation-request
          PROPOSAL_ARTIFACT_DIR: ${{ github.workspace }}/fix-proposal
          APPROVAL_ARTIFACT_DIR: ${{ github.workspace }}/fix-approval-record
          PREFLIGHT_RESULT_DIR: ${{ runner.temp }}/sandbox-validation-preflight
          VALIDATION_ACTOR: ${{ github.event.workflow_run.actor.login }}
          FIX_POLICY: ${{ github.workspace }}/sandbox-control/.github/codex/fix-policy.yml
          SANDBOX_RESULT_SCHEMA: ${{ github.workspace }}/sandbox-control/.github/codex/schemas/sandbox-validation-result.schema.json
          MAX_ARTIFACT_BYTES: "100000"
        run: |
          python3 sandbox-control/scripts/sandbox_validation.py preflight

      - name: Upload sandbox preflight result artifact
        if: steps.preflight.outputs.preflight_ready == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.preflight.outputs.artifact_name }}
          path: ${{ runner.temp }}/sandbox-validation-preflight
          if-no-files-found: error
          retention-days: 3
          include-hidden-files: false

  post_sandbox_validation:
    name: Post sandbox validation preflight comment
    needs: preflight
    if: needs.preflight.result == 'success' && needs.preflight.outputs.should_comment == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Download trusted sandbox comment control plane
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TRUSTED_REF: ${{ github.sha }}
          CONTROL_DIR: ${{ github.workspace }}/sandbox-control
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          ref = os.environ["TRUSTED_REF"]
          control_dir = Path(os.environ["CONTROL_DIR"])
          paths = [
              "scripts/sandbox_validation.py",
              "scripts/fix_proposal_generator.py",
              "scripts/approval_record.py",
              "scripts/architect_review_retry.py",
              "scripts/check_fix_proposal_design.py",
              ".github/codex/schemas/sandbox-validation-result.schema.json",
          ]
          for path in paths:
              quoted = urllib.parse.quote(path, safe="/")
              url = f"https://api.github.com/repos/{repo}/contents/{quoted}?ref={ref}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))
              if payload.get("type") != "file" or payload.get("encoding") != "base64":
                  raise RuntimeError(f"trusted control file unavailable: {path}")
              data = base64.b64decode(payload["content"])
              destination = control_dir / path
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(data)
          PY

      - name: Download sandbox preflight result artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.preflight.outputs.artifact_name }}
          path: ${{ github.workspace }}/sandbox-validation-preflight

      - name: Post or update sandbox preflight comment
        env:
          PYTHONPATH: ${{ github.workspace }}/sandbox-control/scripts
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ needs.preflight.outputs.pr_number }}
          HEAD_SHA: ${{ needs.preflight.outputs.head_sha }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          SANDBOX_RESULT_PATH: ${{ github.workspace }}/sandbox-validation-preflight/sandbox-validation-result.json
          SANDBOX_RESULT_SCHEMA: ${{ github.workspace }}/sandbox-control/.github/codex/schemas/sandbox-validation-result.schema.json
        run: |
          python3 sandbox-control/scripts/sandbox_validation.py post-comment
