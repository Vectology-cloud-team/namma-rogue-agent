name: Sandbox Test Validator

on:
  workflow_run:
    workflows:
      - Sandbox Test Request Collector
    types:
      - completed

concurrency:
  group: sandbox-test-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  sandbox_test:
    name: Run approved sandbox tests
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.name == 'Sandbox Test Request Collector' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.repository.full_name == github.repository &&
      github.repository == 'Vectology-cloud-team/namma-rogue-agent'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: read
      pull-requests: read
    outputs:
      result_ready: ${{ steps.run_tests.outputs.result_ready || 'false' }}
      should_comment: ${{ steps.run_tests.outputs.should_comment || 'false' }}
      artifact_name: ${{ steps.prepare.outputs.artifact_name }}
      artifact_id: ${{ steps.upload_result.outputs.artifact-id }}
      pr_number: ${{ steps.validate_request.outputs.pr_number }}
      head_sha: ${{ steps.validate_request.outputs.head_sha }}
      status: ${{ steps.run_tests.outputs.status }}
      sandbox_test_id: ${{ steps.prepare.outputs.sandbox_test_id }}
    steps:
      - name: Download trusted sandbox test control plane
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TRUSTED_REF: ${{ github.sha }}
          CONTROL_DIR: ${{ github.workspace }}/sandbox-test-control
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          ref = os.environ["TRUSTED_REF"]
          control_dir = Path(os.environ["CONTROL_DIR"])
          paths = [
              "scripts/sandbox_test.py",
              "scripts/sandbox_apply.py",
              "scripts/sandbox_validation.py",
              "scripts/fix_proposal_generator.py",
              "scripts/approval_record.py",
              "scripts/architect_review_retry.py",
              "scripts/check_fix_proposal_design.py",
              "scripts/sandbox_test_support/compileall_checks.py",
              "scripts/sandbox_test_support/stage2c_targeted_tests.py",
              "scripts/sandbox_test_support/stage2c_b1_clamp_tests.py",
              "scripts/sandbox_test_support/support_paths.py",
              "scripts/sandbox_test_support/unit_tests.py",
              "scripts/sandbox_test_support/workflow_checker_tests.py",
              ".github/codex/fix-policy.yml",
              ".github/codex/sandbox-test-policy.yml",
              ".github/codex/schemas/fix-proposal.schema.json",
              ".github/codex/schemas/approval-record.schema.json",
              ".github/codex/schemas/sandbox-validation-result.schema.json",
              ".github/codex/schemas/sandbox-test-result.schema.json",
          ]
          for path in paths:
              quoted = urllib.parse.quote(path, safe="/")
              url = f"https://api.github.com/repos/{repo}/contents/{quoted}?ref={ref}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))
              if payload.get("type") != "file" or payload.get("encoding") != "base64":
                  raise RuntimeError(f"trusted control file unavailable: {path}")
              destination = control_dir / path
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(base64.b64decode(payload["content"]))
          PY

      - name: Download sandbox test request artifact
        id: download_request
        env:
          PYTHONPATH: ${{ github.workspace }}/sandbox-test-control/scripts
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COLLECTOR_RUN_ID: ${{ github.event.workflow_run.id }}
          ARTIFACT_NAME: sandbox-test-request-${{ github.event.workflow_run.id }}
          TEST_REQUEST_DIR: ${{ github.workspace }}/sandbox-test-request
          MAX_ARTIFACT_BYTES: "50000"
        run: |
          python3 sandbox-test-control/scripts/sandbox_test.py download-request-artifact

      - name: Validate sandbox test request manifest
        id: validate_request
        env:
          PYTHONPATH: ${{ github.workspace }}/sandbox-test-control/scripts
          TEST_REQUEST_DIR: ${{ github.workspace }}/sandbox-test-request
        run: |
          python3 sandbox-test-control/scripts/sandbox_test.py validate-request

      - name: Select trusted artifacts and prepare sandbox tests
        id: prepare
        env:
          PYTHONPATH: ${{ github.workspace }}/sandbox-test-control/scripts
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TEST_REQUEST_DIR: ${{ github.workspace }}/sandbox-test-request
          TEST_CONTEXT_DIR: ${{ runner.temp }}/sandbox-test-context
          PROPOSAL_ARTIFACT_DIR: ${{ runner.temp }}/fix-proposal
          APPROVAL_ARTIFACT_DIR: ${{ runner.temp }}/fix-approval-record
          PREFLIGHT_ARTIFACT_DIR: ${{ runner.temp }}/sandbox-validation-preflight
          APPLY_ARTIFACT_DIR: ${{ runner.temp }}/sandbox-apply-result
          TEST_ACTOR: ${{ github.event.workflow_run.actor.login }}
          FIX_POLICY: ${{ github.workspace }}/sandbox-test-control/.github/codex/fix-policy.yml
          SANDBOX_TEST_POLICY: ${{ github.workspace }}/sandbox-test-control/.github/codex/sandbox-test-policy.yml
          SANDBOX_RESULT_SCHEMA: ${{ github.workspace }}/sandbox-test-control/.github/codex/schemas/sandbox-validation-result.schema.json
          MAX_ARTIFACT_BYTES: "100000"
        run: |
          python3 sandbox-test-control/scripts/sandbox_test.py prepare

      - name: Checkout exact pull request HEAD into sandbox
        if: steps.prepare.outputs.test_ready == 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ steps.prepare.outputs.head_sha }}
          path: sandbox-worktree
          fetch-depth: 1
          persist-credentials: false
          submodules: false
          lfs: false
          clean: true

      - name: Run approved tests in ephemeral sandbox
        id: run_tests
        if: steps.prepare.outputs.test_ready == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}/sandbox-test-control/scripts
          GITHUB_REPOSITORY: ${{ github.repository }}
          TEST_CONTEXT_DIR: ${{ runner.temp }}/sandbox-test-context
          TEST_RESULT_DIR: ${{ runner.temp }}/sandbox-test-result
          TEST_SUPPORT_DIR: ${{ github.workspace }}/sandbox-test-control/scripts/sandbox_test_support
          SANDBOX_WORKTREE: ${{ github.workspace }}/sandbox-worktree
          PATCH_FILE: ${{ runner.temp }}/namma-fix.patch
          SANDBOX_TEST_RESULT_SCHEMA: ${{ github.workspace }}/sandbox-test-control/.github/codex/schemas/sandbox-test-result.schema.json
        run: |
          python3 sandbox-test-control/scripts/sandbox_test.py run-tests

      - name: Upload sandbox test result artifact
        id: upload_result
        if: steps.run_tests.outputs.result_ready == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.prepare.outputs.artifact_name }}
          path: ${{ runner.temp }}/sandbox-test-result
          if-no-files-found: error
          retention-days: 3
          include-hidden-files: false

  post_sandbox_test:
    name: Post sandbox test comment
    needs: sandbox_test
    if: needs.sandbox_test.result == 'success' && needs.sandbox_test.outputs.should_comment == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Download trusted sandbox test comment control plane
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TRUSTED_REF: ${{ github.sha }}
          CONTROL_DIR: ${{ github.workspace }}/sandbox-test-control
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          ref = os.environ["TRUSTED_REF"]
          control_dir = Path(os.environ["CONTROL_DIR"])
          paths = [
              "scripts/sandbox_test.py",
              "scripts/sandbox_apply.py",
              "scripts/sandbox_validation.py",
              "scripts/fix_proposal_generator.py",
              "scripts/approval_record.py",
              "scripts/architect_review_retry.py",
              "scripts/check_fix_proposal_design.py",
              ".github/codex/schemas/sandbox-test-result.schema.json",
          ]
          for path in paths:
              quoted = urllib.parse.quote(path, safe="/")
              url = f"https://api.github.com/repos/{repo}/contents/{quoted}?ref={ref}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))
              if payload.get("type") != "file" or payload.get("encoding") != "base64":
                  raise RuntimeError(f"trusted control file unavailable: {path}")
              destination = control_dir / path
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(base64.b64decode(payload["content"]))
          PY

      - name: Download sandbox test result artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.sandbox_test.outputs.artifact_name }}
          path: ${{ github.workspace }}/sandbox-test-result

      - name: Post or update sandbox test comment
        env:
          PYTHONPATH: ${{ github.workspace }}/sandbox-test-control/scripts
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ needs.sandbox_test.outputs.pr_number }}
          HEAD_SHA: ${{ needs.sandbox_test.outputs.head_sha }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          ARTIFACT_ID: ${{ needs.sandbox_test.outputs.artifact_id }}
          TEST_RESULT_PATH: ${{ github.workspace }}/sandbox-test-result/sandbox-test-result.json
          SANDBOX_TEST_RESULT_SCHEMA: ${{ github.workspace }}/sandbox-test-control/.github/codex/schemas/sandbox-test-result.schema.json
        run: |
          python3 sandbox-test-control/scripts/sandbox_test.py post-comment
