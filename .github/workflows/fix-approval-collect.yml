name: Fix Approval Request Collect

on:
  pull_request:
    types:
      - labeled

concurrency:
  group: fix-approval-collect-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  collect:
    name: Collect untrusted fix approval request
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'ai-fix-approved' &&
      github.event.pull_request.base.repo.full_name == github.repository &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.repository == 'Vectology-cloud-team/namma-rogue-agent'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Collect fix approval request artifact
        env:
          OUTPUT_DIR: ${{ runner.temp }}/fix-approval-request
          COLLECTOR_WORKFLOW_NAME: Fix Approval Request Collect
          COLLECTOR_WORKFLOW_RUN_ID: ${{ github.run_id }}
          MAX_ARTIFACT_BYTES: "50000"
          REQUEST_STAGE: FIX_APPROVAL_REQUEST
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          import shutil
          from pathlib import Path

          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text())
          pull_request = event["pull_request"]
          output_dir = Path(os.environ["OUTPUT_DIR"]).resolve()
          labels = [
              label["name"]
              for label in pull_request.get("labels", [])
              if isinstance(label, dict) and "name" in label
          ]
          event_label = ""
          if isinstance(event.get("label"), dict):
              event_label = str(event["label"].get("name", ""))
          manifest = {
              "schema_version": "fix-approval-request-v1",
              "request_stage": os.environ["REQUEST_STAGE"],
              "repository": event["repository"]["full_name"],
              "pull_request_number": int(pull_request["number"]),
              "base_sha": pull_request["base"]["sha"],
              "head_sha": pull_request["head"]["sha"],
              "actor": event["sender"]["login"],
              "author_association": pull_request["author_association"],
              "draft": bool(pull_request["draft"]),
              "base_repository": pull_request["base"]["repo"]["full_name"],
              "head_repository": pull_request["head"]["repo"]["full_name"],
              "labels": labels,
              "event_action": event["action"],
              "event_name": "pull_request",
              "event_label": event_label,
              "collector_workflow_name": os.environ["COLLECTOR_WORKFLOW_NAME"],
              "collector_workflow_run_id": int(os.environ["COLLECTOR_WORKFLOW_RUN_ID"]),
          }
          if output_dir.exists():
              shutil.rmtree(output_dir)
          output_dir.mkdir(parents=True)
          (output_dir / "manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          artifact_bytes = sum(path.stat().st_size for path in output_dir.iterdir())
          max_artifact_bytes = int(os.environ["MAX_ARTIFACT_BYTES"])
          if artifact_bytes > max_artifact_bytes:
              raise SystemExit(
                  f"Artifact size {artifact_bytes} exceeds {max_artifact_bytes} bytes"
              )
          PY

      - name: Upload fix approval request artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fix-approval-request-${{ github.run_id }}
          path: ${{ runner.temp }}/fix-approval-request
          if-no-files-found: error
          retention-days: 7
          include-hidden-files: false
